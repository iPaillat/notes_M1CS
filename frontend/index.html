<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes - Développement Sécurisé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1e1e2e;
    }

    #last-update {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      max-width: 760px;
      margin: 0 auto;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f0f0f5;
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #666;
    }

    tbody tr {
      border-top: 1px solid #f0f0f0;
      transition: background .15s;
    }

    tbody tr.highlight {
      animation: flash 1s ease-out;
    }

    @keyframes flash {
      0%   { background: #fffbcc; }
      100% { background: transparent; }
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
    }

    .note-cell {
      font-weight: 600;
      width: 120px;
    }

    .bar-cell { width: 180px; }

    .bar-wrap {
      background: #eee;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
    }

    .bar-red    { background: #e74c3c; }
    .bar-orange { background: #e67e22; }
    .bar-green  { background: #27ae60; }

    footer {
      color: #aaa;
      font-size: 12px;
      margin-top: 40px;
      text-align: center;
    }

    footer a { color: #aaa; text-decoration: none; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>
  <h1>Notes - Développement Sécurisé</h1>
  <div id="last-update">Chargement…</div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Note</th>
          <th>Progression</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer>
    Propulsé par GL Conseil ·
    <a href="https://github.com/Gladrat" target="_blank">
      <img src="https://github.com/Gladrat.png" width="18"
           style="border-radius:50%; vertical-align:middle; margin-right:4px">
      Gladrat
    </a>
  </footer>

  <script>
    const tbody = document.getElementById("tbody");
    const lastUpdate = document.getElementById("last-update");
    let prevNotes = {};

    function barClass(note, sur) {
      const pct = note / sur;
      if (pct > 0.6) return "bar-green";
      if (pct >= 0.5) return "bar-orange";
      return "bar-red";
    }

    function render(etudiants) {
      etudiants.forEach((e, i) => {
        const key = `${e.nom}-${e.prenom}`;
        const pct = Math.round((e.note / e.sur) * 100);
        const cls = barClass(e.note, e.sur);
        const changed = prevNotes[key] !== undefined && prevNotes[key] !== e.note;
        prevNotes[key] = e.note;

        let row = document.getElementById(`row-${i}`);
        if (!row) {
          row = document.createElement("tr");
          row.id = `row-${i}`;
          row.innerHTML = `
            <td class="nom"></td>
            <td class="prenom"></td>
            <td class="note-cell"></td>
            <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill"></div></div></td>
          `;
          tbody.appendChild(row);
        }

        row.querySelector(".nom").textContent = e.nom;
        row.querySelector(".prenom").textContent = e.prenom;
        row.querySelector(".note-cell").textContent = `${e.note}/${e.sur}`;

        const fill = row.querySelector(".bar-fill");
        fill.style.width = pct + "%";
        fill.className = `bar-fill ${cls}`;

        if (changed) {
          row.classList.remove("highlight");
          void row.offsetWidth;
          row.classList.add("highlight");
        }
      });
    }

    async function refresh() {
      try {
        const res = await fetch("/notes");
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data.etudiants);
        const now = new Date();
        lastUpdate.textContent = `Dernière mise à jour : ${now.toLocaleTimeString("fr-FR")}`;
      } catch {
        lastUpdate.textContent = "Erreur de chargement - nouvelle tentative…";
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
